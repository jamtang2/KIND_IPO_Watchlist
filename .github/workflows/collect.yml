name: KIND IPO 수집

on:
  # 매주 목요일 21:00 KST = UTC 목요일 12:00
  # GitHub은 60일간 커밋/활동이 없으면 schedule을 자동 비활성화함.
  # 이 프로젝트는 매주 실행되므로 해당 없음.
  schedule:
    - cron: "0 12 * * 4"

  # 수동 실행 (목요일 이외 또는 즉시 확인 필요 시)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: python -m playwright install chromium --with-deps

      - name: KIND 데이터 수집
        run: python collect.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/companies.json
          git diff --cached --quiet && echo "변경 없음 — 스킵" || \
            git commit -m "data: KIND 예비심사 현황 갱신 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
